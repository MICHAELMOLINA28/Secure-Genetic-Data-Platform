<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form onsubmit="login(event)">
    <input type="text" placeholder="Email" required><br><br>
    <input type="password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<script>
function login(e) {
    e.preventDefault();
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
