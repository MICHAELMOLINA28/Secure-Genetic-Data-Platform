<!DOCTYPE html>
<html>
<head>
    <title>Login - Secure Genetic Data Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Secure Genetic Data Platform</h1>
    <h2>Login to Access Your Health & Genetic Data</h2>

    <form>
        <label>Email:</label>
        <input type="text">

        <label>Password:</label>
        <input type="password">

        <button type="submit">Login</button>
    </form>

    <p><a href="#">Forgot Password?</a> | <a href="#">Create Account</a></p>

    <p class="secure-msg">Your data is securely encrypted. You control how your genetic information is stored and shared.</p>
</div>

</body>
</html>
